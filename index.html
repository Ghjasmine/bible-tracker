<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="讀完聖經">
<title>讀完聖經 — 66卷全追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eae9e4;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e0dfd8;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-bdr:#bfdbfe;
  --green:#0f6e56;--green-bg:#e1f5ee;--green-bdr:#9fe1cb;
  --amber:#854f0b;--amber-bg:#faeeda;--amber-bdr:#f0cf9a;
  --r:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:#3a3a3c;
    --blue:#60a5fa;--blue-bg:#1e3a5f;--blue-bdr:#2563eb;
    --green:#5dcaa5;--green-bg:#083428;--green-bdr:#0f6e56;
    --amber:#fac775;--amber-bg:#3d2200;--amber-bdr:#854f0b;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;min-height:100vh}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:99}
.nb{flex:1;border:none;background:none;color:var(--text3);font-size:10px;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit}
.nb.on{color:var(--blue)}
.nb svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}

/* ── PANELS ── */
.panel{display:none;padding:12px 14px}
.panel.on{display:block}

/* ── DASHBOARD ── */
.hero{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center}
.hero-num{font-size:48px;font-weight:700;color:var(--blue);line-height:1}
.hero-sub{font-size:13px;color:var(--text2);margin-top:4px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:600}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.prog-wrap{margin-bottom:12px}
.prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.prog-bg{height:7px;background:var(--bg3);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;transition:width .4s}

/* ── NEXT CARD ── */
.now-card{border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid var(--blue-bdr);background:var(--blue-bg)}
.now-tag{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.now-book{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.now-ch{font-size:14px;color:var(--text2);margin-bottom:10px}
.now-key{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;padding:8px 10px;background:var(--bg);border-radius:var(--r)}
.btn-row{display:flex;gap:8px}
.btn-watch{flex:1;background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-done{background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-done:active{opacity:.8}

/* ── STREAK ── */
.streak-row{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.dot{width:22px;height:22px;border-radius:50%;background:var(--bg3)}
.dot.hit{background:var(--blue)}
.dot-sub{font-size:9px;color:var(--text3);text-align:center;margin-top:1px}

/* ── BOOK LIST ── */
.sec{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin:14px 0 8px}
.testament-header{font-size:13px;font-weight:700;color:var(--text);padding:10px 0 6px;border-bottom:.5px solid var(--border);margin-bottom:4px}
.book-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:.5px solid var(--border);cursor:pointer;-webkit-user-select:none}
.book-row:active{background:var(--bg2)}
.bk-check{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.bk-check.done{background:var(--green);border-color:var(--green)}
.bk-check.partial{border-color:var(--amber);background:var(--amber-bg)}
.bk-info{flex:1;min-width:0}
.bk-name{font-size:14px;font-weight:600;color:var(--text)}
.bk-sub{font-size:11px;color:var(--text3);margin-top:1px}
.bk-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.bk-cnt{font-size:12px;color:var(--text3)}
.bk-pct{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.pct-done{background:var(--green-bg);color:var(--green)}
.pct-part{background:var(--amber-bg);color:var(--amber)}
.pct-none{background:var(--bg3);color:var(--text3)}

/* ── CHAPTER VIEW (in book detail) ── */
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 0 12px;font-family:inherit}
.ch-card{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.ch-card.active{border-color:var(--blue)}
.ch-card.done-card{border-color:var(--green-bdr);background:var(--green-bg)}
.ch-top{display:flex;align-items:center;gap:10px;margin-bottom:0}
.ch-ck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-ck.done{background:var(--green);border-color:var(--green)}
.ch-ck svg{width:12px;height:12px;stroke:white;stroke-width:2.5;display:none}
.ch-ck.done svg{display:block}
.ch-num{font-size:14px;font-weight:600;flex:1}
.ch-num.done-txt{color:var(--green);text-decoration:line-through;text-decoration-color:var(--green)}
.ch-watch{font-size:11px;color:var(--blue);border:.5px solid var(--blue-bdr);border-radius:var(--r);padding:3px 8px;background:var(--blue-bg);white-space:nowrap;text-decoration:none}
.ch-detail{margin-top:8px;padding-top:8px;border-top:.5px solid var(--border);display:none}
.ch-card.active .ch-detail{display:block}
.ch-key{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.ch-apply{font-size:11px;color:var(--text3);line-height:1.5}
.ch-mark-btn{margin-top:10px;width:100%;padding:9px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.ch-mark-btn.undone{background:var(--green);color:#fff}
.ch-mark-btn.redone{background:var(--bg3);color:var(--text2)}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:10px 14px 10px 36px;border:.5px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}

.reset-area{text-align:center;padding:20px 0}
.reset-btn{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:7px 16px;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<nav class="nav">
  <button class="nb on" onclick="goTab('dash',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

</nav>

<!-- ── DASH ── -->
<div id="tab-dash" class="panel on">
  <div class="hero">
    <div class="hero-num" id="d-pct">0%</div>
    <div class="hero-sub">已完成 <span id="d-done">0</span> / <span id="d-total">1189</span> 章</div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-n" id="d-books">0</div><div class="stat-l">書卷完成</div></div>
    <div class="stat"><div class="stat-n" id="d-streak">0</div><div class="stat-l">連續天</div></div>
    <div class="stat"><div class="stat-n" id="d-left">1189</div><div class="stat-l">剩餘章數</div></div>
  </div>

  <div id="now-section"></div>

  <div class="sec">本週打卡</div>
  <div class="streak-row" id="streak-dots"></div>

  <div class="sec">書卷進度</div>
  <div class="prog-wrap">
    <div class="prog-lbl"><span>舊約</span><span id="p-ot-txt"></span></div>
    <div class="prog-bg"><div class="prog-fill" id="p-ot" style="width:0%;background:var(--amber)"></div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-lbl"><span>新約</span><span id="p-nt-txt"></span></div>
    <div class="prog-bg"><div class="prog-fill" id="p-nt" style="width:0%;background:var(--blue)"></div></div>
  </div>

  <div class="reset-area"><button class="reset-btn" onclick="doReset()">⟲ 清除所有進度</button></div>
</div>

<!-- ── BOOKS ── -->
<div id="tab-books" class="panel">
  <div id="book-list-view">
    <div id="book-list"></div>
  </div>
  <div id="book-detail-view" style="display:none">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2"><polyline points="15 18 9 12 15 6"/></svg>
      返回書卷
    </button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ── SEARCH ── -->
<div id="tab-search" class="panel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="搜尋書卷名稱..." oninput="doSearch(this.value)">
  </div>
  <div id="search-results"></div>
</div>

// STATE
// ════════════════════════════
let state={};
const SK='btr66_v1';
const SD='btr66_days';
function load(){try{const s=localStorage.getItem(SK);if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
load();

function chDone(bookId,ch){return !!state[bookId+'_'+ch];}
function setChDone(bookId,ch,val){state[bookId+'_'+ch]=val;save();}
function bookDoneCount(b){let n=0;for(let i=1;i<=b.chapters;i++)if(chDone(b.id,i))n++;return n;}
function bookFullDone(b){return bookDoneCount(b)===b.chapters;}
function today(){return new Date().toISOString().slice(0,10);}

function addToday(){
  let days=[];try{const d=localStorage.getItem(SD);if(d)days=JSON.parse(d);}catch(e){}
  const t=today();
  if(!days.includes(t)){days.push(t);try{localStorage.setItem(SD,JSON.stringify(days));}catch(e){}}
  return days;
}
function getStreak(){
  let days=[];try{const d=localStorage.getItem(SD);if(d)days=JSON.parse(d);}catch(e){}
  days.sort();
  let streak=0,cur=new Date();
  for(let i=days.length-1;i>=0;i--){
    const d=new Date(days[i]+'T00:00:00');
    const diff=Math.round((cur-d)/86400000);
    if(diff<=1){streak++;cur=d;}else break;
  }
  return{streak,days};
}

// ════════════════════════════
// DASHBOARD
// ════════════════════════════
function updateDash(){
  let totalDone=0,totalAll=0,booksDone=0;
  let otDone=0,otAll=0,ntDone=0,ntAll=0;
  BIBLE.forEach(b=>{
    const d=bookDoneCount(b);
    totalDone+=d; totalAll+=b.chapters;
    if(bookFullDone(b))booksDone++;
    if(b.testament==='OT'){otDone+=d;otAll+=b.chapters;}
    else{ntDone+=d;ntAll+=b.chapters;}
  });
  document.getElementById('d-done').textContent=totalDone;
  document.getElementById('d-total').textContent=totalAll;
  document.getElementById('d-pct').textContent=Math.round(totalDone/totalAll*100)+'%';
  document.getElementById('d-books').textContent=booksDone;
  document.getElementById('d-left').textContent=totalAll-totalDone;
  const{streak,days}=getStreak();
  document.getElementById('d-streak').textContent=streak;
  // OT/NT progress
  document.getElementById('p-ot').style.width=Math.round(otDone/otAll*100)+'%';
  document.getElementById('p-ot-txt').textContent=otDone+'/'+otAll;
  document.getElementById('p-nt').style.width=Math.round(ntDone/ntAll*100)+'%';
  document.getElementById('p-nt-txt').textContent=ntDone+'/'+ntAll;
  // streak dots
  const last7=Array.from({length:7},(_,i)=>{const dt=new Date();dt.setDate(dt.getDate()-(6-i));return dt.toISOString().slice(0,10);});
  document.getElementById('streak-dots').innerHTML=last7.map(dt=>{
    const wd=['日','一','二','三','四','五','六'][new Date(dt+'T00:00:00').getDay()];
    return`<div style="text-align:center"><div class="dot${days.includes(dt)?' hit':''}" title="${dt}"></div><div class="dot-sub">${wd}</div></div>`;
  }).join('');
  // next chapter
  renderNow();
}

function findNext(){
  for(const b of BIBLE){
    for(let ch=1;ch<=b.chapters;ch++){
      if(!chDone(b.id,ch))return{b,ch};
    }
  }
  return null;
}

function renderNow(){
  const next=findNext();
  const el=document.getElementById('now-section');
  if(!next){el.innerHTML=`<div class="now-card"><div class="now-tag">🎉 完成</div><div class="now-book">恭喜！66卷已全部讀完</div></div>`;return;}
  const {b,ch}=next;
  const key=chKey(b.id,ch);
  const plUrl=`https://www.youtube.com/playlist?list=${b.playlist}`;
  // 嘗試連結到該章（YouTube playlist 無法直接跳章，但可開播放清單從頭播）
  el.innerHTML=`
    <div class="now-card">
      <div class="now-tag">📖 繼續讀經</div>
      <div class="now-book">${b.name}</div>
      <div class="now-ch">第 ${ch} 章 ／ 共 ${b.chapters} 章</div>
      ${key?`<div class="now-key">💡 ${key}</div>`:''}
      <div class="btn-row">
        <a class="btn-watch" href="${plUrl}" target="_blank">▶ 開啟 JAM 影片</a>
        <button class="btn-done" onclick="markAndNext('${b.id}',${ch})">✓ 完成</button>
      </div>
    </div>`;
}

function markAndNext(bookId,ch){
  setChDone(bookId,ch,true);
  addToday();
  updateDash();
  renderBookList();
}

// BOOK LIST
// ════════════════════════════
function renderBookList(filter=''){
  const el=document.getElementById('book-list');
  let html='';
  let curTestament='';
  BIBLE.forEach(b=>{
    if(filter && !b.name.includes(filter) && !b.abbr.includes(filter))return;
    if(b.testament!==curTestament){
      curTestament=b.testament;
      html+=`<div class="testament-header">${curTestament==='OT'?'📜 舊約（39卷）':'✝️ 新約（27卷）'}</div>`;
    }
    const done=bookDoneCount(b);
    const pct=Math.round(done/b.chapters*100);
    const full=done===b.chapters;
    const none=done===0;
    const ckClass=full?'done':none?'':'partial';
    const pctClass=full?'pct-done':none?'pct-none':'pct-part';
    html+=`<div class="book-row" onclick="openDetail('${b.id}')">
      <div class="bk-check ${ckClass}">
        ${full?'<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:white;stroke-width:3"><polyline points="20 6 9 17 4 12"/></svg>':''}
      </div>
      <div class="bk-info">
        <div class="bk-name">${b.name}</div>
        <div class="bk-sub">${b.testament==='OT'?'舊約':'新約'} · ${b.chapters}章</div>
      </div>
      <div class="bk-right">
        <div class="bk-cnt">${done}/${b.chapters}</div>
        <div class="bk-pct ${pctClass}">${pct}%</div>
      </div>
    </div>`;
  });
  el.innerHTML=html||'<div style="color:var(--text3);padding:20px 0;text-align:center">找不到相符的書卷</div>';
}

  document.getElementById('book-detail-view').style.display='none';
}

  let html=`<div style="margin-bottom:12px">
    <div style="font-size:20px;font-weight:700;margin-bottom:2px">${b.name}</div>
    <div style="font-size:12px;color:var(--text3)">${b.testament==='OT'?'舊約':'新約'} · ${b.chapters}章 · 完成${bookDoneCount(b)}章</div>
    <div style="font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5">${b.key}</div>
    <a href="${plUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:7px 14px;background:var(--blue);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;text-decoration:none">▶ 開啟整卷播放清單</a>
  </div>`;
  for(let ch=1;ch<=b.chapters;ch++){
    const done=chDone(b.id,ch);
    const key=chKey(b.id,ch);
    html+=`<div class="ch-card${done?' done-card':''}" id="chc-${b.id}-${ch}" onclick="toggleChCard('${b.id}',${ch})">
      <div class="ch-top">
        <div class="${done?'ch-ck done':'ch-ck'}">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="${done?'ch-num done-txt':'ch-num'}">第 ${ch} 章</div>
        <a class="ch-watch" href="${plUrl}" target="_blank" onclick="event.stopPropagation()">▶ 播</a>
      </div>
      ${key?`<div class="ch-detail">
        <div class="ch-key">💡 ${key}</div>
        <button class="ch-mark-btn ${done?'redone':'undone'}" onclick="event.stopPropagation();toggleChDone('${b.id}',${ch})">${done?'取消完成':'✓ 標記完成'}</button>
      </div>`:`<div class="ch-detail">
        <button class="ch-mark-btn ${done?'redone':'undone'}" onclick="event.stopPropagation();toggleChDone('${b.id}',${ch})">${done?'取消完成':'✓ 標記完成'}</button>
      </div>`}
    </div>`;
  }
  document.getElementById('detail-content').innerHTML=html;
}

function toggleChCard(bookId,ch){
  const id=`chc-${bookId}-${ch}`;
  if(activeChCard===id){
    document.getElementById(id)?.classList.remove('active');
    activeChCard=null;
  }else{
    if(activeChCard)document.getElementById(activeChCard)?.classList.remove('active');
    document.getElementById(id)?.classList.add('active');
    activeChCard=id;
  }
}

function toggleChDone(bookId,ch){
  const cur=chDone(bookId,ch);
  setChDone(bookId,ch,!cur);
  if(!cur)addToday();
  updateDash();
  renderBookList();
  renderDetail();
}

// ════════════════════════════
// SEARCH
// ════════════════════════════
function doSearch(val){
  const el=document.getElementById('search-results');
  if(!val.trim()){el.innerHTML='';return;}
  const results=BIBLE.filter(b=>b.name.includes(val)||b.abbr.includes(val));
  if(!results.length){el.innerHTML='<div style="color:var(--text3);padding:12px 0">找不到相符書卷</div>';return;}
  el.innerHTML=results.map(b=>{
    const done=bookDoneCount(b);
    const pct=Math.round(done/b.chapters*100);
    const full=done===b.chapters;
    const none=done===0;
    const pctClass=full?'pct-done':none?'pct-none':'pct-part';
    return`<div class="book-row" onclick="goTab('books',document.querySelector('.nb:nth-child(2)'));openDetail('${b.id}')">
      <div class="bk-info">
        <div class="bk-name">${b.name}</div>
        <div class="bk-sub">${b.testament==='OT'?'舊約':'新約'} · ${b.chapters}章</div>
      </div>
      <div class="bk-right">
        <div class="bk-cnt">${done}/${b.chapters}</div>
        <div class="bk-pct ${pctClass}">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════
// NAV
// ════════════════════════════
function goTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
}

// ════════════════════════════
// RESET
// ════════════════════════════
function doReset(){
  if(!confirm('確定清除所有進度？此操作無法復原。'))return;
  state={};save();
  updateDash();renderBookList();
  if(activeBook)renderDetail();
}

// ════════════════════════════
// INIT
// ════════════════════════════
renderBookList();
updateDash();
</script>
</body>
</html>
